<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements — Proton Hub Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/admin/css/admin-base.css">
  <link rel="stylesheet" href="/admin/css/admin-components.css">
  <link rel="stylesheet" href="/admin/css/admin-pages.css">

  <!-- PWA Setup -->
  <link rel="manifest" href="/admin/manifest.json">
  <meta name="theme-color" content="#002855">
  <link rel="apple-touch-icon" href="/Components/Utilities/logo.jpg">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/admin/sw.js').catch(()=>{});
      });
    }
  </script>
</head>
<body>
  <div class="app-layout">
    <div class="main-content" id="mainContent">
      <div class="page-content">
        <div class="toolbar">
          <div class="toolbar-left"><h2 style="font-size:1rem;color:var(--text-secondary);">Manage announcements shown on the website</h2></div>
          <div class="toolbar-right">
            <button class="btn btn-primary" id="addAnnouncementBtn"><i class="fas fa-plus"></i> New Announcement</button>
          </div>
        </div>
        <div class="table-wrapper">
          <table class="data-table" id="announcementsTable">
            <thead>
              <tr>
                <th>Title</th>
                <th>Message</th>
                <th>Type</th>
                <th>Status</th>
                <th>Expires</th>
                <th>Created</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="announcementsBody">
              <tr><td colspan="7"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/admin/js/announcements.js"></script>
</body>
</html>
